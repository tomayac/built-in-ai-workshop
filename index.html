<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Built-in AI Workshop — Instructions</title>
    <style>
      :root {
        --accent: #e37400;
      }
      .prose {
        line-height: 1.7;
        font-size: 0.92rem;
        color: #202124;
      }
      .prose h1 {
        display: none;
      }
      .prose h2 {
        font-size: 1rem;
        font-weight: 700;
        margin: 22px 0 6px;
        color: var(--accent);
      }
      .prose h3 {
        font-size: 0.92rem;
        font-weight: 600;
        margin: 16px 0 4px;
      }
      .prose p {
        margin-bottom: 10px;
      }
      .prose ul,
      .prose ol {
        padding-left: 20px;
        margin-bottom: 10px;
      }
      .prose li {
        margin-bottom: 4px;
      }
      .prose a {
        color: var(--accent);
      }
      .prose code {
        background: #f1f3f4;
        padding: 1px 5px;
        border-radius: 3px;
        font-size: 0.82rem;
      }
      .prose pre {
        background: #f1f3f4;
        border-radius: 6px;
        padding: 12px 14px;
        overflow-x: auto;
        margin-bottom: 12px;
      }
      .prose pre code {
        background: none;
        padding: 0;
        font-size: 0.82rem;
      }
      .prose table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.86rem;
        margin-bottom: 12px;
      }
      .prose th {
        background: #f1f3f4;
        text-align: left;
        padding: 7px 10px;
        font-weight: 600;
      }
      .prose td {
        padding: 7px 10px;
      }
      .prose tr {
        border-bottom: 1px solid #e8eaed;
      }
      #loading {
        color: #9aa0a6;
        font-style: italic;
        font-size: 0.88rem;
        padding: 20px 0;
      }
    </style>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Chrome Built-in AI Workshop</h1>
      <span class="badge">INSTRUCTIONS</span>
    </header>

    <div class="container">
      <div class="card">
        <div id="loading">Loading…</div>
        <div id="content" class="prose"></div>
      </div>
    </div>

    <footer>
      Chrome Built-in AI Workshop ·
      <a href="https://developer.chrome.com/docs/ai/built-in" target="_blank"
        >docs</a
      >
      ·
      <a href="https://github.com/GoogleChromeLabs/web-ai-demos" target="_blank"
        >demos</a
      >
      ·
      <a href="starter.html">starter</a>
      ·
      <a href="solution.html">solution</a>
    </footer>

    <script type="module">
      import { marked } from 'https://esm.sh/marked@14';

      const res = await fetch('README.md');
      const md = await res.text();

      document.getElementById('loading').remove();
      document.getElementById('content').innerHTML = marked.parse(md);
    </script>
  </body>
</html>
